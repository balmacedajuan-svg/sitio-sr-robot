<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sr. Robot - Servicio Técnico de PC y Notebooks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0c10;
            --bg-card: #121620;
            --neon-green: #39ff14;
            --text-light: #ffffff;
            --text-gray: #8a99ad;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
        }

        /* Estilo de Red de Circuitos de Fondo Simulado */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(57, 255, 20, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 75% 70%, rgba(57, 255, 20, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Encabezado / Hero */
        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid rgba(57, 255, 20, 0.1);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.6), 0 0 30px rgba(57, 255, 20, 0.2);
            margin-bottom: 10px;
        }

        .logo-text span {
            color: var(--neon-green);
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-gray);
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        /* Botón de Acción Principal */
        .btn-main {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            background-color: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .btn-main:hover {
            background-color: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.6);
            cursor: pointer;
        }

        /* Sección de Servicios */
        .services-section {
            padding: 60px 0;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 30px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(57, 255, 20, 0.3);
        }

        .card-icon {
            color: var(--neon-green);
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
        }

        .card h3 {
            margin-bottom: 12px;
            font-size: 1.3rem;
        }

        .card p {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        /* Bloque de Confianza */
        .trust-banner {
            background: linear-gradient(135deg, #121620 0%, #0d111a 100%);
            border-left: 4px solid var(--neon-green);
            padding: 40px;
            border-radius: 6px;
            margin: 40px 0;
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            text-align: center;
        }

        .trust-item h4 {
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 8px;
        }

        .trust-item p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        /* Información de Contacto / Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-gray);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        footer p {
            margin-bottom: 10px;
        }

        /* Nuevos estilos para los enlaces de redes sociales */
        .social-container {
            margin: 20px 0 25px 0;
        }

        .social-link {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-light);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .social-link:hover {
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
        }

        /* Botón Flotante de WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .logo-text { font-size: 2.2rem; }
            .section-title { font-size: 1.6rem; }
            .social-link { margin: 10px 10px; display: inline-block; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
