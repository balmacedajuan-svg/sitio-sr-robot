        :root {
            --bg-dark: #0a0c10;
            --bg-card: #121620;
            --neon-green: #39ff14;

            --text-gray: #8a99ad;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
        }

        /* Estilo de Red de Circuitos de Fondo Simulado */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(57, 255, 20, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 75% 70%, rgba(57, 255, 20, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

            padding: 60px 20px;
            border-bottom: 1px solid rgba(57, 255, 20, 0.1);
        }

            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-light);

            letter-spacing: 2px;

            margin-bottom: 10px;
        }

        .logo-text span {
            color: var(--neon-green);
        }

            font-size: 1.2rem;
            color: var(--text-gray);

            margin: 0 auto 30px auto;
